name: Build Signed Play AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Restore permanent signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.LATHAEPS_KEYSTORE_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64" || { echo "Missing SIGNING_KEY_BASE64 repository secret"; exit 1; }
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/lathaeps-release.jks"

      - name: Build signed Play AAB
        env:
          STORE_PASSWORD: ${{ secrets.LATHAEPS_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LATHAEPS_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LATHAEPS_KEY_PASSWORD }}
        run: |
          test -n "$STORE_PASSWORD" || { echo "Missing STORE_PASSWORD repository secret"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "Missing KEY_ALIAS repository secret"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "Missing KEY_PASSWORD repository secret"; exit 1; }
          gradle --no-daemon clean bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/lathaeps-release.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename signed AAB
        run: cp app/build/outputs/bundle/release/app-release.aab Business_Dost_v3.23.82_Play_Signed.aab

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Business-Dost-Play-AAB-v3.23.82
          path: Business_Dost_v3.23.82_Play_Signed.aab
          if-no-files-found: error
