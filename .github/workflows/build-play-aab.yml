name: Build Signed Play AAB

on:
  workflow_dispatch:

jobs:
  build-play-aab:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Check required signing secrets
        env:
          SIGNING_KEY_BASE64: ${{ secrets.LATHAEPS_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.LATHAEPS_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LATHAEPS_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LATHAEPS_KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_KEY_BASE64" || (echo "Missing SIGNING_KEY_BASE64" && exit 1)
          test -n "$STORE_PASSWORD" || (echo "Missing STORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing KEY_PASSWORD" && exit 1)

      - name: Restore upload keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.LATHAEPS_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build release app bundle
        run: gradle bundleRelease --stacktrace

      - name: Sign app bundle
        env:
          STORE_PASSWORD: ${{ secrets.LATHAEPS_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LATHAEPS_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LATHAEPS_KEY_PASSWORD }}
        run: |
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -f "$AAB"
          jarsigner \
            -keystore "$RUNNER_TEMP/upload-keystore.jks" \
            -storepass:env STORE_PASSWORD \
            -keypass:env KEY_PASSWORD \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            "$AAB" "$KEY_ALIAS"
          jarsigner -verify -verbose -certs "$AAB"
          cp "$AAB" "LATHAEPS_SMART_v3.23.56_Play_Signed.aab"

      - name: Upload Play Store bundle
        uses: actions/upload-artifact@v4
        with:
          name: LATHAEPS-SMART-Play-AAB-v3.23.56
          path: LATHAEPS_SMART_v3.23.56_Play_Signed.aab
          if-no-files-found: error
