name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  debug-apk:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - run: gradle assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: LathaBulk-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

  signed-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Restore private signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.LATHAEPS_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/lathaeps-release.jks
      - name: Build signed release APK
        env:
          LATHAEPS_KEYSTORE_FILE: lathaeps-release.jks
          LATHAEPS_KEYSTORE_PASSWORD: ${{ secrets.LATHAEPS_KEYSTORE_PASSWORD }}
          LATHAEPS_KEY_ALIAS: ${{ secrets.LATHAEPS_KEY_ALIAS }}
          LATHAEPS_KEY_PASSWORD: ${{ secrets.LATHAEPS_KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace
      - name: Rename update APK
        run: mv app/build/outputs/apk/release/app-release.apk LathaEPS-Smart.apk
      - uses: actions/upload-artifact@v4
        with:
          name: LathaEPS-Smart-Signed-APK
          path: LathaEPS-Smart.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: LathaEPS-Smart.apk
          generate_release_notes: true
