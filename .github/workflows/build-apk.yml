name: Build and Release Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  verify-build:
  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Verify project builds
        run: gradle assembleDebug --stacktrace

  signed-release:
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Restore private signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.LATHAEPS_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/lathaeps-release.jks
      - name: Build permanently signed release APK
        env:
          LATHAEPS_KEYSTORE_FILE: lathaeps-release.jks
          LATHAEPS_KEYSTORE_PASSWORD: ${{ secrets.LATHAEPS_KEYSTORE_PASSWORD }}
          LATHAEPS_KEY_ALIAS: ${{ secrets.LATHAEPS_KEY_ALIAS }}
          LATHAEPS_KEY_PASSWORD: ${{ secrets.LATHAEPS_KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace
      - name: Prepare update files
        run: |
          cp app/build/outputs/apk/release/app-release.apk LathaEPS-Smart.apk
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(sed -nE 's/^[[:space:]]*versionCode[[:space:]]+([0-9]+).*/\1/p' app/build.gradle | head -1)"
          jq -n --arg version "$VERSION" --argjson versionCode "$VERSION_CODE" \
            --arg downloadUrl "https://github.com/jainvikes6270-gif/msgbulk/releases/latest/download/LathaEPS-Smart.apk" \
            '{version:$version,versionCode:$versionCode,downloadUrl:$downloadUrl}' > latest-version.json
      - uses: actions/upload-artifact@v4
        with:
          name: LathaEPS-Smart-Permanent-Signed
          path: LathaEPS-Smart.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            LathaEPS-Smart.apk
            latest-version.json
          generate_release_notes: true
