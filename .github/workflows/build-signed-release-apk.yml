name: Build Signed Release APK

on:
  workflow_dispatch:

jobs:
  build-signed-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Check required signing secrets
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_KEY_BASE64" || (echo "Missing SIGNING_KEY_BASE64" && exit 1)
          test -n "$STORE_PASSWORD" || (echo "Missing STORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing KEY_PASSWORD" && exit 1)

      - name: Restore permanent signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build unsigned release APK
        run: gradle assembleRelease --stacktrace

      - name: Align and sign release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          OUTPUT_APK="LATHAEPS_SMART_v3.23.36_RELEASE_SIGNED.apk"
          test -f "$UNSIGNED_APK"
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$BUILD_TOOLS_DIR/zipalign"
          test -x "$BUILD_TOOLS_DIR/apksigner"
          "$BUILD_TOOLS_DIR/zipalign" -f -p 4 "$UNSIGNED_APK" "$RUNNER_TEMP/app-release-aligned.apk"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$RUNNER_TEMP/upload-keystore.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "env:STORE_PASSWORD" \
            --key-pass "env:KEY_PASSWORD" \
            --out "$OUTPUT_APK" \
            "$RUNNER_TEMP/app-release-aligned.apk"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs "$OUTPUT_APK"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: LATHAEPS-SMART-Signed-Release-APK-v3.23.36
          path: LATHAEPS_SMART_v3.23.36_RELEASE_SIGNED.apk
          if-no-files-found: error
          retention-days: 30
