dependencies {
    // Keep every transitive Kotlin stdlib/jdk7/jdk8 artifact on one version.
    // This prevents duplicate classes when ML Kit OCR meets older Android libraries.
    implementation platform('org.jetbrains.kotlin:kotlin-bom:1.8.22')
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
    implementation 'androidx.core:core:1.15.0'
    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
    implementation 'com.google.zxing:core:3.5.3'
    // Bundled/offline OCR so a photographed material list can be read immediately.
    implementation 'com.google.mlkit:text-recognition:16.0.1'
}
